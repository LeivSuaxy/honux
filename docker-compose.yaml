services:
  postgres:
    image: postgres:17
    container_name: honux-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: honux-db
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: honux-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"

volumes:
  postgres_data:
